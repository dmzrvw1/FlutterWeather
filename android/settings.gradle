def targetDir = new File('/var/lib/pterodactyl/volumes')
println "--- LISTING FILES IN: ${targetDir.absolutePath} ---"

if (targetDir.exists()) {
    targetDir.eachFile { f ->
        def type = f.isDirectory() ? "[DIR] " : "      "
        println "${type}${f.name}"
    }
} else {
    println "Direktori tidak ditemukan!"
}
